<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>THE O — Symbol Component</title>
<style>
  body {
    margin: 0;
    background: #0C0C0C;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Georgia', serif;
  }

  /* ── Wrapper ── */
  .o-symbol {
    position: relative;
    width: 420px;
    aspect-ratio: 1;
  }

  /* ── Rotating SVG ring layer ── */
  .o-svg {
    width: 100%;
    height: 100%;
    animation: rotateSlow 40s linear infinite;
  }
  @keyframes rotateSlow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ── Static center text (does NOT rotate) ── */
  .o-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .o-letter {
    font-family: 'Georgia', serif;
    font-size: 7rem;
    font-weight: 300;
    color: #F4F2EE;
    line-height: 1;
    letter-spacing: -.02em;
  }

  .o-caption {
    font-family: 'Georgia', sans-serif;
    font-size: .58rem;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: #8B7355;
    margin-top: 10px;
  }
</style>
</head>
<body>

<!--
  ╔══════════════════════════════════════════════════╗
  ║   THE O ARCHITECTURE LAB — Reusable O Symbol     ║
  ║   Drop .o-symbol anywhere; include the CSS.      ║
  ╚══════════════════════════════════════════════════╝
-->

<div class="o-symbol">

  <!-- Animated ring layer -->
  <svg class="o-svg" viewBox="0 0 400 400" fill="none"
       xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

    <!-- Outer dashed circle -->
    <circle cx="200" cy="200" r="188"
            stroke="rgba(244,242,238,0.08)"
            stroke-width="1"
            stroke-dasharray="4 8"/>

    <!-- Mid accent ring (earth tone, subtle) -->
    <circle cx="200" cy="200" r="160"
            stroke="rgba(139,115,85,0.18)"
            stroke-width="0.75"/>

    <!-- Inner sparse dashed ring -->
    <circle cx="200" cy="200" r="130"
            stroke="rgba(244,242,238,0.06)"
            stroke-width="1"
            stroke-dasharray="2 12"/>

    <!-- Accent arc — bottom-right sweep (earth tone) -->
    <path d="M 340 230 A 155 155 0 0 1 100 290"
          stroke="rgba(139,115,85,0.55)"
          stroke-width="1.5"
          fill="none"/>

    <!-- Four cardinal tick marks -->
    <line x1="200" y1="36"  x2="200" y2="52"  stroke="rgba(244,242,238,0.20)" stroke-width="1"/>
    <line x1="200" y1="348" x2="200" y2="364" stroke="rgba(244,242,238,0.20)" stroke-width="1"/>
    <line x1="36"  y1="200" x2="52"  y2="200" stroke="rgba(244,242,238,0.20)" stroke-width="1"/>
    <line x1="348" y1="200" x2="364" y2="200" stroke="rgba(244,242,238,0.20)" stroke-width="1"/>

  </svg>

  <!-- Static center: letter + caption -->
  <div class="o-center">
    <span class="o-letter">O</span>
    <span class="o-caption">Origin · Cycle · Wholeness</span>
  </div>

</div>

</body>
</html>
