<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>THE O ARCHITECTURE LAB</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<!--
  Bold display  → Space Grotesk 700 / 600
  Thin contrast → DM Sans 300 / 400
-->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet" />
<style>
/* ── Reset ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: #080808;
  color: #F0EDE8;
  font-family: 'DM Sans', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── Video BG ───────────────────────────────────────────── */
.bg-video {
  position: fixed;
  inset: 0;
  z-index: 0;
}
.bg-video video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: brightness(.52) saturate(.75);
}
.bg-video::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 70% at 50% 50%, transparent 20%, rgba(5,5,5,.42) 100%),
    linear-gradient(180deg, rgba(5,5,5,.58) 0%, transparent 20%, transparent 76%, rgba(5,5,5,.72) 100%);
}

/* ── Shell ──────────────────────────────────────────────── */
.shell {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100vh;
  display: grid;
  grid-template-rows: 1fr auto;
}

/* ── Header ─────────────────────────────────────────────── */
header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: flex-start;
  padding: 40px 52px 0;
}

.nav-left  { display: flex; flex-direction: column; align-items: flex-start; gap: 7px; padding-top: 3px; }
.nav-right { display: flex; flex-direction: column; align-items: flex-end;   gap: 7px; padding-top: 3px; }

.nav-link {
  font-family: 'Space Grotesk', sans-serif;
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .24em;
  text-transform: uppercase;
  color: rgba(240,237,232,.42);
  text-decoration: none;
  line-height: 1;
  position: relative;
  padding-bottom: 3px;
  transition: color .28s;
}
.nav-link::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 0; height: 1px;
  background: rgba(240,237,232,.70);
  transition: width .38s cubic-bezier(.4,0,.2,1);
}
.nav-link:hover { color: #F0EDE8; }
.nav-link:hover::after { width: 100%; }

/* Logo centre */
.logo-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  text-decoration: none;
}
.logo-name {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: clamp(.82rem, 1.3vw, 1.08rem);
  letter-spacing: .34em;
  text-transform: uppercase;
  color: #F0EDE8;
  white-space: nowrap;
  line-height: 1;
  display: flex;
  align-items: center;
}
.logo-o-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 1.18em;
  height: 1.18em;
  border: 1.5px solid #F0EDE8;
  border-radius: 50%;
  margin: 0 3px;
  font-size: .82em;
  line-height: 1;
}
.logo-sub {
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  font-style: italic;
  font-size: clamp(.54rem, .85vw, .68rem);
  letter-spacing: .20em;
  color: rgba(240,237,232,.38);
  white-space: nowrap;
}

/* ── Bottom bar ─────────────────────────────────────────── */
.bottom-bar {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 52px 44px;
}

/* ── Tagline ─────────────────────────────────────────────── */
.tagline { display: flex; flex-direction: column; }

.tl-bold {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: clamp(2.8rem, 6.2vw, 6rem);
  line-height: .90;
  letter-spacing: -.04em;
  color: #F0EDE8;
  text-transform: uppercase;
  display: block;
}

/* Thread line — fixed height so bold lines don't jump */
.tl-thread-row {
  display: flex;
  align-items: baseline;
  gap: .22em;
  height: clamp(3rem, 6.8vw, 6.6rem); /* matches adjacent bold lines */
  overflow: hidden;
}

.tl-thread-prefix {
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  font-style: italic;
  font-size: clamp(2rem, 4.4vw, 4.2rem);
  color: rgba(240,237,232,.42);
  letter-spacing: -.01em;
  white-space: nowrap;
  line-height: 1;
  flex-shrink: 0;
}

/* The animated word */
.tl-thread-word {
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  font-style: italic;
  font-size: clamp(2rem, 4.4vw, 4.2rem);
  color: rgba(240,237,232,.65);
  letter-spacing: -.01em;
  line-height: 1;
  white-space: nowrap;
  position: relative;
}

/* Blinking cursor — thin vertical line like a needle/thread */
.tl-thread-word::after {
  content: '';
  display: inline-block;
  width: 2px;
  height: .85em;
  background: rgba(139,115,85,.85);
  margin-left: 4px;
  vertical-align: middle;
  animation: blink .95s step-end infinite;
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0; }
}

.tl-sub {
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  font-size: clamp(.7rem, 1.2vw, .88rem);
  letter-spacing: .20em;
  color: rgba(240,237,232,.35);
  text-transform: uppercase;
  margin-top: 18px;
}

/* ── GET IN TOUCH pill ──────────────────────────────────── */
.git-wrap {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  flex-shrink: 0;
}

.git-pill {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  overflow: hidden;
  width: 68px;
  height: 68px;
  border-radius: 34px;
  background: #F0EDE8;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  padding: 0;
  transition: width .52s cubic-bezier(.4,0,.2,1);
}
.git-pill:hover { width: 320px; }

.git-icon {
  flex-shrink: 0;
  width: 68px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: center;
  order: 2;
}
.git-icon svg {
  width: 20px;
  height: 20px;
  stroke: #0C0C0C;
  stroke-width: 2;
  transition: transform .42s cubic-bezier(.4,0,.2,1);
}
.git-pill:hover .git-icon svg { transform: rotate(-45deg); }

.git-content {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 5px;
  padding: 0 0 0 26px;
  opacity: 0;
  transform: translateX(14px);
  transition: opacity .28s .12s, transform .34s .12s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
  order: 1;
}
.git-pill:hover .git-content {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}

.git-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: .58rem;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: rgba(12,12,12,.45);
  line-height: 1;
}
.git-content a {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: .68rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: #0C0C0C;
  text-decoration: none;
  line-height: 1;
  transition: color .15s;
  white-space: nowrap;
}
.git-content a:hover { color: #8B7355; }
.git-sep {
  width: 20px;
  height: 1px;
  background: rgba(12,12,12,.18);
  margin: 2px 0;
}
.git-divider {
  width: 1px;
  height: 26px;
  background: rgba(12,12,12,.14);
  margin: 0 4px;
  align-self: center;
  order: 1.5;
  flex-shrink: 0;
}

/* ── Scroll hint ────────────────────────────────────────── */
.scroll-hint {
  position: fixed;
  bottom: 44px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.scroll-hint span {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: .52rem;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: rgba(240,237,232,.25);
}
.scroll-line {
  width: 1px;
  height: 42px;
  background: linear-gradient(180deg, rgba(240,237,232,.28), transparent);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.28} 50%{opacity:.9} }

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 768px) {
  header { padding: 28px 28px 0; }
  .bottom-bar { padding: 0 28px 36px; }
  .git-pill:hover { width: 260px; }
  .tl-bold { letter-spacing: -.03em; }
}
@media (max-width: 520px) {
  header { grid-template-columns: 1fr auto; }
  .nav-right { display: none; }
  .logo-sub  { display: none; }
  .logo-center { align-items: flex-end; }
  .tl-thread-prefix { font-size: clamp(1.4rem, 6vw, 2.4rem); }
  .tl-thread-word   { font-size: clamp(1.4rem, 6vw, 2.4rem); }
}
</style>
</head>
<body>

<!-- ── Background Video ───────────────────────────────── -->
<div class="bg-video">
  <video autoplay muted loop playsinline
    poster="https://images.unsplash.com/photo-1518780664697-55e3ad937233?w=1920&q=80"
    aria-hidden="true">
    <source src="https://videos.pexels.com/video-files/4763824/4763824-uhd_2560_1440_24fps.mp4" type="video/mp4" />
    <source src="https://videos.pexels.com/video-files/3571264/3571264-uhd_2560_1440_25fps.mp4" type="video/mp4" />
  </video>
</div>

<!-- ── Shell ─────────────────────────────────────────── -->
<div class="shell">

  <!-- HEADER -->
  <header>
    <nav class="nav-left">
      <a href="#works"  class="nav-link">Works</a>
      <a href="#studio" class="nav-link">Studio</a>
    </nav>

    <a href="/" class="logo-center" aria-label="THE O ARCHITECTURE LAB">
      <div class="logo-name">
        THE&nbsp;<span class="logo-o-wrap">O</span>&nbsp;ARCHITECTURE
      </div>
      <div class="logo-sub">LAB &mdash; Istanbul</div>
    </a>

    <nav class="nav-right">
      <a href="#research" class="nav-link">Research</a>
      <a href="#process"  class="nav-link">Process</a>
    </nav>
  </header>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">

    <!-- Tagline -->
    <div class="tagline">
      <span class="tl-bold">Architecture</span>

      <!-- Thread animation row -->
      <div class="tl-thread-row" aria-live="polite" aria-label="as a catalyst">
        <span class="tl-thread-prefix">as&nbsp;a</span>
        <span class="tl-thread-word" id="threadWord"></span>
      </div>

      <span class="tl-bold">for&nbsp;Change.</span>
      <p class="tl-sub">Research &nbsp;&middot;&nbsp; Design &nbsp;&middot;&nbsp; Impact</p>
    </div>

    <!-- GET IN TOUCH pill -->
    <div class="git-wrap">
      <button class="git-pill" aria-label="Get in touch — expand for contact options">

        <div class="git-content">
          <span class="git-label">Get in touch</span>
          <div class="git-sep"></div>
          <a href="mailto:info@theoarchlab.com">info@theoarchlab.com</a>
          <a href="index.html#cta">Start a project →</a>
        </div>

        <div class="git-divider"></div>

        <div class="git-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="13 6 19 12 13 18"/>
          </svg>
        </div>

      </button>
    </div>

  </div>
</div>

<!-- Scroll hint -->
<div class="scroll-hint" aria-hidden="true">
  <span>Scroll</span>
  <div class="scroll-line"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   THREAD ANIMATION
   Cycles through words, typing each letter one-by-one
   like thread being pulled through fabric.
   ═══════════════════════════════════════════════════════ */
(function () {
  const el = document.getElementById('threadWord');

  const words = [
    'catalyst',
    'medium',
    'research tool',
    'dialogue',
    'transformation',
    'living memory',
    'social act',
    'discipline',
  ];

  /* Timing (ms) */
  const TYPE_SPEED   = 72;   /* ms per character typed   */
  const DELETE_SPEED = 38;   /* ms per character deleted  */
  const HOLD_AFTER   = 2200; /* pause after fully typed   */
  const HOLD_BEFORE  = 320;  /* pause before deleting     */

  let wordIndex   = 0;
  let charIndex   = 0;
  let deleting    = false;
  let timer       = null;

  function tick() {
    const current = words[wordIndex];

    if (!deleting) {
      /* Type one character */
      charIndex++;
      el.textContent = current.slice(0, charIndex);

      if (charIndex === current.length) {
        /* Fully typed — hold, then start deleting */
        timer = setTimeout(() => {
          deleting = true;
          timer = setTimeout(tick, DELETE_SPEED);
        }, HOLD_AFTER);
        return;
      }
      timer = setTimeout(tick, TYPE_SPEED);

    } else {
      /* Delete one character */
      charIndex--;
      el.textContent = current.slice(0, charIndex);

      if (charIndex === 0) {
        /* Fully deleted — move to next word */
        deleting = false;
        wordIndex = (wordIndex + 1) % words.length;
        timer = setTimeout(tick, HOLD_BEFORE);
        return;
      }
      timer = setTimeout(tick, DELETE_SPEED);
    }
  }

  /* Kick off after a short initial delay */
  timer = setTimeout(tick, 600);
})();

/* ═══════════════════════════════════════════════════════
   PILL — touch toggle
   ═══════════════════════════════════════════════════════ */
const pill = document.querySelector('.git-pill');
let open = false;

pill.addEventListener('click', e => {
  if (!window.matchMedia('(hover:none)').matches) return;
  open = !open;
  pill.style.width = open ? '300px' : '';
  e.stopPropagation();
});
document.addEventListener('click', () => {
  if (open) { open = false; pill.style.width = ''; }
});

/* ═══════════════════════════════════════════════════════
   VIDEO fallback
   ═══════════════════════════════════════════════════════ */
const vid = document.querySelector('.bg-video video');
vid.addEventListener('error', () => { vid.style.display = 'none'; });
</script>
</body>
