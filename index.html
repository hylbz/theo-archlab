<script>
  /* Robust redirect: works with or without a trailing slash by building a
     repo-root-relative absolute path from the current location. */

    var seg = location.pathname.split('/').filter(Boolean)[0] || '';
    var base = seg ? '/' + seg + '/' : '/';
    location.replace(base + 'Landing_Page/index.html');
  })();
</script>
